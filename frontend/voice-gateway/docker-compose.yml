services:
  voice-gateway:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "8787"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - voice-gateway
    ports:
      - "80:80"
      - "443:443"
    environment:
      VOICE_GATEWAY_DOMAIN: ${VOICE_GATEWAY_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
